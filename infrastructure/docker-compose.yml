services:
  postgres:
    image: postgres:15-alpine
    container_name: emds-microservices-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartedms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartedms123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartedms-network

  minio:
    image: minio/minio:latest
    container_name: emds-microservices-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - smartedms-network

  mongodb:
    image: mongo:latest
    container_name: emds-microservices-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: smartedms-audit
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartedms-network

volumes:
  postgres_data:
  minio_data:
  mongodb_data:

networks:
  smartedms-network:
    driver: bridge
